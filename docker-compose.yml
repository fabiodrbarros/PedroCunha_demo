# ─────────────────────────────────────────────────────────────
#  Pedro Cunha Carpintaria — Docker Compose
#
#  Single container + SQLite, persisted on the `database` volume.
#  Secrets come from `.env` via ${VAR} interpolation.
#  IMPORTANT: Compose interpolates the `.env`, so every "$" in the
#  bcrypt ADMIN_PASSWORD_HASH must be DOUBLED to "$$" inside `.env`.
# ─────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      args:
        # Inlined into the client bundle at BUILD time — must be the real
        # public URL before you run `docker compose build`.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: pedrocunha-demo:latest
    container_name: pedrocunha-demo
    restart: unless-stopped
    environment:
      # SQLite DB on the persistent volume.
      DATABASE_URL: "file:/data/prod.db"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      # Remember: "$" doubled to "$$" in .env (e.g. $$2a$$12$$...).
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      # host:container — 8081 is free on the server (8080 is capiarcos).
      # Optional: only for local curl/debug; the tunnel reaches the
      # container by name over the shared `web` network.
      - "8081:3000"
    volumes:
      - database:/data
      - uploads:/app/public/uploads
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/pt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  database:
  uploads:

# Shared external network that the cloudflared tunnel sits on — the
# Public Hostname in Cloudflare points at http://pedrocunha-demo:3000.
networks:
  web:
    external: true
