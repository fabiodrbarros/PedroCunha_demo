# ─────────────────────────────────────────────────────────────
#  Pedro Cunha Carpintaria — Docker Compose
#
#  Single container + SQLite, persisted on the `database` volume.
#  Secrets are loaded from `.env` via `env_file` (passed to the
#  container literally — so the bcrypt hash uses normal "$",
#  no "\$" or "$$" escaping needed).
# ─────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      args:
        # Inlined into the client bundle at BUILD time — must be the real
        # public URL before you run `docker compose build`.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: pedrocunha-demo:latest
    container_name: pedrocunha-demo
    restart: unless-stopped
    # Runtime env (ADMIN_USERNAME / ADMIN_PASSWORD_HASH / SESSION_SECRET /
    # NEXT_PUBLIC_SITE_URL) — values passed to the container as-is.
    env_file:
      - .env
    environment:
      # Force the SQLite DB onto the persistent volume, regardless of .env.
      DATABASE_URL: "file:/data/prod.db"
    ports:
      # host:container — 8081 is free on the server (8080 is capiarcos).
      # Optional: only for local curl/debug; the tunnel reaches the
      # container by name over the shared `web` network.
      - "8081:3000"
    volumes:
      - database:/data
      - uploads:/app/public/uploads
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/pt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  database:
  uploads:

# Shared external network that the cloudflared tunnel sits on — the
# Public Hostname in Cloudflare points at http://pedrocunha-demo:3000.
networks:
  web:
    external: true
